services:
  frontend:
    build:
      context: ./frontend
    expose:
      - "3000"
    depends_on:
      - backend
    environment:
      - BACKEND_INTERNAL_URL=http://backend:8000
    networks:
      - app-network

  backend:
    build:
      context: ./backend
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres123@db:5432/dsa_duel
      - CORS_ORIGINS=http://localhost:3000,https://dsaduel.ranker.app,https://www.dsaduel.ranker.app,https://dsaduel-api.ranker.app,https://www.dsaduel-api.ranker.app
    networks:
      - app-network

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres123
      - POSTGRES_DB=dsa_duel
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

volumes:
  pgdata:

networks:
  app-network:
    driver: bridge
